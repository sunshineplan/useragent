name: Update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1,15 * *'

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: '1.x'

      - name: Build and Run
        run: |
          go mod download
          go build -ldflags "-s -w"
          ./useragent -url ${{ secrets.URL }}

      - name: Commit
        id : commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git commit chrome.txt -m "Update"
          git push
          echo "::set-output name=date::$(TZ=CST date +'%Y-%m-%d')"
          echo "::set-output name=body::$(cat chrome.txt)"

      - name: Send backup email
        uses: dawidd6/action-send-mail@v2
        with:
          server_address: smtp.live.com
          server_port: 587
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          subject: UserAgent Update Success - ${{ steps.commit.outputs.date }}
          body: ${{ steps.commit.outputs.body }}
          from: Github Actions
          to: ${{ secrets.TO }}
